version: '3.9'

services:
  frontend:
    build: ./frontend
    ports:
      - '3001:3001'
    depends_on:
      - gateway

  gateway:
    build: ./gateway
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
    depends_on:
      - redis
      - mailpit

  ai-service:
    build: ./ai-agent
    ports:
      - '8000:8000'
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025'
      - '8025:8025'
